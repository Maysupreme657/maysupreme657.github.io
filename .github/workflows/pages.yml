name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A0884A: ${{ secrets.A0884A }}
          B4F606: ${{ secrets.B4F606 }}
        run: |
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A0884A', '')
          env_b = os.environ.get('B4F606', '')
          doc = pathlib.Path('index.html')
          body = doc.read_text(encoding='utf-8')
          result = body
          if env_a:
              result = result.replace('<!-- 88d4f9224882630e732a9a33b11b163e2ea79b892d43 -->', env_a)
          if env_b:
              result = result.replace('<!-- dbe328c44fc3e9e9bae7aacd30 -->', env_b)
          if result == body and (env_a or env_b):
              sys.exit(1)
          if result != body:
              doc.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
